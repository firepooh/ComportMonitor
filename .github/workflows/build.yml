name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read    # 릴리스는 별도 public 저장소(ComportMonitor-releases)에 생성

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 태그(v1.2.3)면 태그에서 버전을 뽑고, 일반 푸시면 개발 버전을 붙인다
      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.ref }}'.StartsWith('refs/tags/v')) {
            $v = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $v = "1.0.0-dev.${{ github.run_number }}"
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      # ① 프레임워크 의존 단일 exe (~1MB, 실행 PC에 .NET 8 Desktop Runtime 필요)
      - name: Publish (framework-dependent)
        run: >
          dotnet publish ComportMonitor.csproj -c Release -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish-fdd

      # ② self-contained 단일 exe (~60MB, 런타임 포함, 아무 PC에서나 실행)
      - name: Publish (self-contained standalone)
        run: >
          dotnet publish ComportMonitor.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish-sc

      - name: Rename standalone exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Copy-Item publish-fdd/ComportMonitor.exe dist/ComportMonitor.exe
          Copy-Item publish-sc/ComportMonitor.exe dist/ComportMonitor-standalone.exe
          Get-ChildItem dist | Format-Table Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComportMonitor-win-x64
          path: dist/*

      # 소스 저장소는 private이므로 릴리스는 배포 전용 public 저장소에 만든다.
      # RELEASES_TOKEN: 두 저장소 contents:write 권한이 있는 PAT (Actions secret)
      - name: Create Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: >
          gh release create '${{ github.ref_name }}'
          'dist/ComportMonitor.exe#ComportMonitor.exe (1MB, .NET 8 Desktop Runtime 필요)'
          'dist/ComportMonitor-standalone.exe#ComportMonitor-standalone.exe (런타임 포함, 바로 실행)'
          --repo firepooh/ComportMonitor-releases
          --title 'ComportMonitor ${{ github.ref_name }}'
          --notes 'ComportMonitor ${{ github.ref_name }} — 자세한 내용과 사용법은 README 참고'
